<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>coding-teacher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="brand">coding-teacher</h1>
      <div class="challenge" role="status" aria-live="polite">
        <div class="challenge-row">
          <span class="challenge-label">Challenge</span>
          <span id="challenge-counter" class="challenge-counter">1 / 3</span>
          <span id="challenge-status" class="challenge-status">not yet</span>
        </div>
        <div id="challenge-text" class="challenge-text">—</div>
        <div id="challenge-dots" class="challenge-dots" role="tablist" aria-label="Challenges"></div>
      </div>
    </div>
    <nav class="levels" aria-label="Levels">
      <button class="level" data-level="old-school" aria-pressed="true">
        <span class="level-name">Old School</span>
        <span class="level-meta">HTML · CSS · JavaScript</span>
      </button>
      <button class="level" data-level="modern" disabled>
        <span class="level-name">Modern</span>
        <span class="level-meta locked">Locked</span>
      </button>
      <button class="level" data-level="vibe" disabled>
        <span class="level-name">Vibe Coding</span>
        <span class="level-meta locked">Locked</span>
      </button>
    </nav>
  </header>

  <section class="controls">
    <div class="control-group" role="tablist" aria-label="Language">
      <button class="lang" data-lang="html" aria-pressed="true">HTML</button>
      <button class="lang" data-lang="css">CSS</button>
      <button class="lang" data-lang="js">JavaScript</button>
    </div>

    <div class="control-group">
      <label for="starter">Try a starter:</label>
      <select id="starter">
        <option value="">— choose one —</option>
      </select>
    </div>
  </section>

  <main class="workbench">
    <section class="pane editor-pane" aria-label="Code editor">
      <div class="pane-header">
        <span id="editor-label">index.html</span>
        <span class="hint">Type here — the preview updates as you type.</span>
      </div>
      <textarea
        id="editor"
        spellcheck="false"
        autocapitalize="off"
        autocorrect="off"
      ></textarea>
    </section>

    <section class="pane preview-pane" aria-label="Visual output">
      <div class="pane-header">
        <span>Preview</span>
        <span class="hint">This is what your code produces.</span>
      </div>
      <iframe id="preview" title="Preview" sandbox="allow-scripts"></iframe>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
